<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hymnal App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; transition: all 0.2s; cursor: pointer; }
        .card:active { background-color: #334155; transform: scale(0.98); }
        .hymn-id { color: #818cf8; font-weight: bold; margin-right: 12px; }

        /* Verse View */
        .verse-container {
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            border: 1px solid #334155;
        }
        .cn-text { display: block; font-size: 1.5rem; color: #ffffff; font-weight: 500; line-height: 1.4; }
        .py-text { display: block; font-size: 1rem; color: #94a3b8; margin-top: 4px; font-style: italic; }

        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .page-btn { background-color: #312e81; color: #e0e7ff; padding: 12px 24px; border-radius: 12px; font-weight: bold; }
        .page-btn:disabled { opacity: 0.2; }
        
        /* Language Toggle Styling */
        .lang-btn { padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .lang-active { background-color: #818cf8; color: white; }
        .lang-inactive { background-color: #334155; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col shadow-2xl">
        
        <header class="bg-indigo-950 text-white p-5 sticky top-0 z-20 shadow-xl border-b border-indigo-900">
            <div class="flex justify-between items-center mb-4">
                <h1 id="appTitle" class="text-xl font-bold text-indigo-200">赞美诗</h1>
                <div class="flex gap-2">
                    <button id="btnCN" onclick="switchLanguage('CN')" class="lang-btn lang-active">中文</button>
                    <button id="btnEN" onclick="switchLanguage('EN')" class="lang-btn lang-inactive">EN</button>
                </div>
            </div>
            <input type="text" id="searchBar" oninput="filterHymns()" placeholder="Search..." 
                class="w-full p-4 rounded-xl bg-slate-900 text-white border border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
        </header>

        <div id="listView" class="p-4 space-y-3"></div>

        <div id="detailView" class="hidden fixed inset-0 z-30 p-6 overflow-y-auto bg-slate-950">
            <button onclick="goBack()" class="text-slate-400 mb-5 flex items-center gap-2">← Back</button>
            <h2 id="hymnTitle" class="text-center text-indigo-400 font-bold text-xl mb-4"></h2>
            <div class="verse-container"><div id="hymnLyrics" class="lyrics-box"></div></div>
            <div class="nav-controls">
                <button id="prevBtn" class="page-btn" onclick="changeVerse(-1)">Previous</button>
                <span id="pageInfo" class="text-slate-500 text-sm"></span>
                <button id="nextBtn" class="page-btn" onclick="changeVerse(1)">Next</button>
            </div>
        </div>
    </div>

    <script>
        let allHymns = [];
        let currentHymnSections = [];
        let currentVerseIndex = 0;
        let currentLang = 'CN';

        // 1. Initial Load
        window.onload = () => loadData('Hymnsc.js');

        // 2. Language Switcher Logic
        async function switchLanguage(lang) {
            if (currentLang === lang) return;
            currentLang = lang;

            // UI Feedback
            document.getElementById('btnCN').className = `lang-btn ${lang === 'CN' ? 'lang-active' : 'lang-inactive'}`;
            document.getElementById('btnEN').className = `lang-btn ${lang === 'EN' ? 'lang-active' : 'lang-inactive'}`;
            document.getElementById('appTitle').innerText = lang === 'CN' ? '赞美诗' : 'Hymnal';
            document.getElementById('searchBar').placeholder = lang === 'CN' ? '搜索编号或题目...' : 'Search ID or Title...';

            const fileName = lang === 'CN' ? 'Hymnsc.js' : 'Hymne.js';
            await loadData(fileName);
        }

        // 3. Fetch Data from File
        async function loadData(fileName) {
            try {
                const response = await fetch(fileName);
                const text = await response.text();
                
                // If your file has "const hymns = ", we strip it. 
                // If it's just raw data [ ... ], JSON.parse works directly.
                const cleanData = text.replace(/^(const|let|var)\s+\w+\s*=\s*/, '').replace(/;$/, '');
                allHymns = JSON.parse(cleanData);

                // Sort numerically
                allHymns.sort((a, b) => parseInt(a.id) - parseInt(b.id));
                renderList(allHymns);
            } catch (err) {
                console.error("Error loading file:", err);
                document.getElementById('listView').innerHTML = `<p class="text-red-400 p-4">Error loading ${fileName}. Check file format.</p>`;
            }
        }

        function renderList(data) {
            const list = document.getElementById('listView');
            list.innerHTML = '';
            data.forEach(h => {
                const div = document.createElement('div');
                div.className = "card p-5 rounded-2xl flex items-center";
                div.innerHTML = `<span class="hymn-id">${h.id}</span> <span class="flex-1">${h.title}</span>`;
                div.onclick = () => showHymn(h);
                list.appendChild(div);
            });
        }

        function filterHymns() {
            const query = document.getElementById('searchBar').value.toLowerCase().trim();
            const filtered = allHymns.filter(h => 
                h.title.toLowerCase().includes(query) || h.id.toString().includes(query)
            );
            renderList(filtered);
        }

        function showHymn(h) {
            document.getElementById('hymnTitle').innerText = h.title;
            currentHymnSections = h.sections;
            currentVerseIndex = 0;
            updateVerseDisplay();
            document.getElementById('detailView').classList.remove('hidden');
        }

        function updateVerseDisplay() {
            const lyricsBox = document.getElementById('hymnLyrics');
            const section = currentHymnSections[currentVerseIndex];
            
            lyricsBox.innerHTML = section.content.map(line => `
                <div class="lyric-line">
                    <span class="cn-text">${line.cn}</span>
                    ${line.py ? `<span class="py-text">${line.py}</span>` : ''}
                </div>
            `).join('');

            document.getElementById('pageInfo').innerText = `Verse ${currentVerseIndex + 1} / ${currentHymnSections.length}`;
            document.getElementById('prevBtn').disabled = (currentVerseIndex === 0);
            document.getElementById('nextBtn').disabled = (currentVerseIndex === currentHymnSections.length - 1);
        }

        function changeVerse(dir) {
            currentVerseIndex += dir;
            updateVerseDisplay();
            document.getElementById('detailView').scrollTo(0, 0);
        }

        function goBack() {
            document.getElementById('detailView').classList.add('hidden');
        }
    </script>
</body>
</html>
