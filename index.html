<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hymnal App</title>
    
    <script src="Hymne.js"></script>
    <script src="Hymnsc.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* List Cards */
        .card { 
            background-color: #1e293b; 
            border: 1px solid #334155; 
            transition: transform 0.1s, background-color 0.2s;
            cursor: pointer;
        }
        .card:active { background-color: #334155; transform: scale(0.97); }
        .hymn-id { color: #818cf8; font-weight: 800; margin-right: 12px; min-width: 35px; }

        /* Modern Verse Container */
        .verse-container {
            min-height: 55vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 1) 100%);
            border-radius: 28px;
            padding: 40px 20px;
            margin: 20px 0;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .cn-text { display: block; font-size: 1.75rem; color: #ffffff; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
        .py-text { display: block; font-size: 1.1rem; color: #94a3b8; font-style: italic; margin-bottom: 25px; }

        .page-btn { 
            flex: 1; 
            background-color: #312e81; 
            color: #e0e7ff; 
            padding: 18px; 
            border-radius: 16px; 
            font-weight: bold; 
            border: 1px solid #4338ca; 
        }
        .page-btn:disabled { opacity: 0.2; }
        
        /* Language Toggle */
        .lang-btn { padding: 8px 20px; border-radius: 99px; font-size: 0.85rem; font-weight: 700; transition: 0.3s; }
        .lang-active { background-color: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
        .lang-inactive { color: #64748b; }

        .sticky-header { backdrop-filter: blur(10px); background-color: rgba(15, 23, 42, 0.9); }
        
        /* Smooth Detail Transition */
        #detailView { transition: transform 0.3s ease-in-out; }
        .hidden-view { transform: translateX(100%); display: none; }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative overflow-x-hidden">
        
        <header class="sticky-header p-5 sticky top-0 z-20 border-b border-slate-800">
            <div class="flex justify-between items-center mb-5">
                <h1 id="appTitle" class="text-2xl font-black tracking-tight text-indigo-300">赞美诗1</h1>
                <div class="flex bg-slate-900 p-1 rounded-full border border-slate-700">
                    <button id="btnCN" onclick="switchLanguage('CN')" class="lang-btn">中文</button>
                    <button id="btnEN" onclick="switchLanguage('EN')" class="lang-btn">EN</button>
                </div>
            </div>
            <div class="relative">
                <input type="text" id="searchBar" oninput="filterHymns()" placeholder="Search..." 
                    class="w-full p-4 pl-12 rounded-2xl bg-slate-800 text-white border border-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <svg class="absolute left-4 top-4 text-slate-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </header>

        <div id="listView" class="p-4 space-y-3 mb-10">
            </div>

        <div id="detailView" class="hidden fixed inset-0 z-30 p-6 overflow-y-auto bg-slate-950">
            <div class="max-w-md mx-auto">
                <button onclick="goBack()" class="text-indigo-400 mb-6 flex items-center gap-2 font-bold py-2">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"></path></svg>
                    Back to List
                </button>
                
                <h2 id="hymnTitle" class="text-center text-white font-bold text-2xl px-4"></h2>
                
                <div class="verse-container">
                    <div id="hymnLyrics" class="lyrics-box"></div>
                </div>

                <div class="flex flex-col items-center gap-4">
                    <div id="pageInfo" class="bg-slate-800 px-4 py-1 rounded-full text-xs font-bold text-indigo-300 uppercase tracking-widest border border-slate-700"></div>
                    <div class="nav-controls w-full flex gap-3">
                        <button id="prevBtn" class="page-btn" onclick="changeVerse(-1)">PREVIOUS</button>
                        <button id="nextBtn" class="page-btn" onclick="changeVerse(1)">NEXT</button>
                    </div>
                </div>
                <div class="h-20"></div>
            </div>
        </div>
    </div>

    <script>
        let allHymns = [];
        let currentHymnSections = [];
        let currentVerseIndex = 0;
        let currentLang = 'CN';

        // 1. App Startup
        window.onload = () => {
            const savedLang = localStorage.getItem('pref_lang') || 'CN';
            applyUI(savedLang);
            loadData(savedLang);
        };

        // 2. Language Management
        function switchLanguage(lang) {
            if (currentLang === lang) return;
            localStorage.setItem('pref_lang', lang);
            applyUI(lang);
            loadData(lang);
            document.getElementById('searchBar').value = ''; // Clear search on switch
        }

        function applyUI(lang) {
            currentLang = lang;
            document.getElementById('btnCN').className = `lang-btn ${lang === 'CN' ? 'lang-active' : 'lang-inactive'}`;
            document.getElementById('btnEN').className = `lang-btn ${lang === 'EN' ? 'lang-active' : 'lang-inactive'}`;
            document.getElementById('appTitle').innerText = lang === 'CN' ? '赞美诗' : 'Hymnal';
            document.getElementById('searchBar').placeholder = lang === 'CN' ? '搜索编号或歌名...' : 'Search Number or Title...';
        }

        function loadData(lang) {
            const listDiv = document.getElementById('listView');
            
            // Access variables loaded from script tags
            try {
                if (lang === 'CN') {
                    allHymns = (typeof hymns_cn !== 'undefined') ? hymns_cn : [];
                } else {
                    allHymns = (typeof hymns_en !== 'undefined') ? hymns_en : [];
                }

                if (allHymns.length === 0) {
                    listDiv.innerHTML = `<div class="text-center text-red-400 p-10 font-bold">Error: Data variable not found.<br><span class="text-xs font-normal">Ensure Hymnsc.js has "const hymns_cn" and Hymne.js has "const hymns_en".</span></div>`;
                    return;
                }

                // Numeric Sort
                allHymns.sort((a, b) => parseInt(a.id) - parseInt(b.id));
                renderList(allHymns);
            } catch (e) {
                console.error(e);
            }
        }

        function renderList(data) {
            const list = document.getElementById('listView');
            list.innerHTML = data.map(h => `
                <div class="card p-5 rounded-2xl flex items-center mb-3 shadow-lg" onclick="showHymn(${h.id})">
                    <span class="hymn-id">${h.id}</span>
                    <span class="flex-1 font-semibold">${h.title}</span>
                    <svg class="text-slate-600" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="m12.14 8.753-5.482 4.796c-.646.566-1.658.106-1.658-.753V3.204a1 1 0 0 1 1.659-.753l5.48 4.796a1 1 0 0 1 0 1.506z"/></svg>
                </div>
            `).join('');
        }

        function filterHymns() {
            const q = document.getElementById('searchBar').value.toLowerCase().trim();
            const filtered = allHymns.filter(h => 
                h.title.toLowerCase().includes(q) || 
                h.id.toString().includes(q)
            );
            renderList(filtered);
        }

        // 3. Detail View Navigation
        function showHymn(id) {
            const hymn = allHymns.find(h => h.id == id);
            if(!hymn) return;
            
            document.getElementById('hymnTitle').innerText = hymn.title;
            currentHymnSections = hymn.sections;
            currentVerseIndex = 0;
            updateDisplay();
            
            document.getElementById('detailView').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        }

        function updateDisplay() {
            const box = document.getElementById('hymnLyrics');
            const sec = currentHymnSections[currentVerseIndex];
            
            box.innerHTML = sec.content.map(l => `
                <div class="lyric-line">
                    <span class="cn-text">${l.cn}</span>
                    ${l.py ? `<span class="py-text">${l.py}</span>` : ''}
                </div>
            `).join('');

            const label = (sec.type && sec.type.toLowerCase() === 'chorus') ? 'Chorus' : `Verse ${currentVerseIndex + 1}`;
            document.getElementById('pageInfo').innerText = `${label} of ${currentHymnSections.length}`;
            
            document.getElementById('prevBtn').disabled = (currentVerseIndex === 0);
            document.getElementById('nextBtn').disabled = (currentVerseIndex === currentHymnSections.length - 1);
        }

        function changeVerse(n) {
            currentVerseIndex += n;
            updateDisplay();
            document.getElementById('detailView').scrollTo(0,0);
        }

        function goBack() {
            document.getElementById('detailView').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
